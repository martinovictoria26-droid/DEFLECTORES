<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VERALLIA / Deflectores & Canaletas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=IBM+Plex+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ─── RESET & BASE ─── */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0c0f;
  --bg2:#111318;
  --bg3:#181b22;
  --border:#1e2230;
  --border2:#252a3a;
  --txt:#c8cdd8;
  --txt-dim:#555e78;
  --txt-faint:#2a3048;
  --blue:#3d7fff;
  --blue-bg:#040f24;
  --blue-border:#132044;
  --blue-txt:#7aaeff;
  --amber:#f0a500;
  --amber-bg:#1a1100;
  --amber-border:#3d2900;
  --amber-txt:#f0a500;
  --green:#00d166;
  --green-bg:#001a0d;
  --green-border:#004d25;
  --green-txt:#00d166;
  --red:#ff4444;
}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;font-size:13px}
button,select{font-family:'IBM Plex Sans',sans-serif;cursor:pointer}

/* ─── LAYOUT ─── */
.app{max-width:1080px;margin:0 auto;padding:28px 20px 60px}

/* ─── TOPBAR ─── */
.topbar{display:flex;align-items:center;gap:12px;margin-bottom:24px;flex-wrap:wrap}
.logo{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700;letter-spacing:.15em;color:var(--amber);background:var(--amber-bg);border:1px solid var(--amber-border);padding:4px 10px;border-radius:3px;text-transform:uppercase;white-space:nowrap}
.topbar-title{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600;color:var(--txt);flex:1;letter-spacing:.04em}
.topbar-title span{color:var(--txt-dim)}
.reload-btn{font-size:11px;font-weight:700;padding:5px 12px;background:var(--bg3);border:1px solid var(--border2);border-radius:4px;color:var(--txt-dim);letter-spacing:.04em;transition:.15s}
.reload-btn:hover{color:var(--txt);border-color:var(--blue)}
.badge-ts{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--txt-faint);background:var(--bg2);border:1px solid var(--border);border-radius:3px;padding:3px 8px;white-space:nowrap}

/* ─── DATE BAR ─── */
.date-bar{display:flex;align-items:center;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.dnbtn{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700;padding:6px 10px;background:var(--bg3);border:1px solid var(--border2);border-radius:4px;color:var(--txt-dim);transition:.15s}
.dnbtn:hover{color:var(--txt);border-color:var(--blue)}
.dlbl{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:700;color:var(--txt);min-width:260px;text-align:center;letter-spacing:.04em}
.hoy-btn{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:700;padding:6px 14px;background:var(--amber);border:none;border-radius:4px;color:#000;letter-spacing:.08em;transition:.1s}
.hoy-btn:hover{background:#ffc046}

/* ─── FILTERS ─── */
.filters{display:flex;gap:10px;align-items:center;margin-bottom:20px;flex-wrap:wrap}
.filters label{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:700;color:var(--txt-dim);letter-spacing:.08em;text-transform:uppercase}
.filters select{font-size:12px;padding:5px 10px;background:var(--bg3);border:1px solid var(--border2);border-radius:4px;color:var(--txt);outline:none}
.filters select:focus{border-color:var(--blue)}

/* ─── LEGEND ─── */
.legend{display:flex;gap:20px;margin-bottom:20px;flex-wrap:wrap}
.leg-i{display:flex;align-items:center;gap:6px;font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--txt-dim);letter-spacing:.06em}
.ldot{width:7px;height:7px;border-radius:50%}
.lu{background:var(--blue)}.lp{background:var(--amber)}.ll{background:var(--green)}

/* ─── SUMMARY STATS ─── */
.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:24px}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:14px 16px}
.stat-lbl{font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:700;color:var(--txt-dim);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px}
.stat-num{font-family:'IBM Plex Mono',monospace;font-size:32px;font-weight:700;line-height:1}
.nu{color:var(--blue)}.np{color:var(--amber)}.nl{color:var(--green)}
.stat-sub{font-size:10px;color:var(--txt-dim);margin-top:3px}

/* ─── COUNTERS TOP ─── */
.counters{display:flex;gap:6px;flex-wrap:wrap}
.cnt{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:700;padding:4px 10px;border-radius:3px;letter-spacing:.06em;border:1px solid}
.cnt-uso{background:var(--blue-bg);border-color:var(--blue-border);color:var(--blue-txt)}
.cnt-proc{background:var(--amber-bg);border-color:var(--amber-border);color:var(--amber-txt)}
.cnt-listo{background:var(--green-bg);border-color:var(--green-border);color:var(--green-txt)}

/* ─── LINE BLOCKS ─── */
.lines{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;align-items:start}
@media(max-width:640px){.lines{grid-template-columns:1fr}}
.lblock{background:var(--bg2);border:1px solid var(--border);border-radius:6px;overflow:hidden}
.lhdr{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--bg3);border-bottom:1px solid var(--border);cursor:pointer;user-select:none;transition:.1s}
.lhdr:hover{background:#1a1f2e}
.lname{font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:700;flex:1;color:var(--txt);letter-spacing:.06em}
.pills{display:flex;gap:4px;flex-wrap:wrap}
.pill{font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:700;padding:2px 8px;border-radius:2px;letter-spacing:.05em;border:1px solid}
.p-uso{background:var(--blue-bg);border-color:var(--blue-border);color:var(--blue-txt)}
.p-proc{background:var(--amber-bg);border-color:var(--amber-border);color:var(--amber-txt)}
.p-listo{background:var(--green-bg);border-color:var(--green-border);color:var(--green-txt)}
.chev{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--txt-faint);transition:transform .2s}
.chev.open{transform:rotate(90deg)}
.lbody{padding:14px 16px;display:none}
.lbody.open{display:block}

/* ─── TIPO SECTION ─── */
.tipo-sec{margin-bottom:14px}
.tipo-sec:last-child{margin-bottom:0}
.tipo-lbl{font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:700;color:var(--txt-faint);text-transform:uppercase;letter-spacing:.12em;margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--border)}

/* ─── CARDS ─── */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:8px}
.card{border-radius:5px;border:1px solid;padding:12px 14px;display:flex;flex-direction:column;gap:5px;transition:.15s}
.card:hover{transform:translateY(-1px)}
.card.uso{background:var(--blue-bg);border-color:var(--blue-border)}
.card.proceso{background:var(--amber-bg);border-color:var(--amber-border)}
.card.listo{background:var(--green-bg);border-color:var(--green-border)}
.card.sin-datos{background:var(--bg);border-color:var(--border)}

.card-tipo{font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:700;line-height:1.1}
.card.uso .card-tipo{color:var(--blue-txt)}
.card.proceso .card-tipo{color:var(--amber-txt)}
.card.listo .card-tipo{color:var(--green-txt)}
.card.sin-datos .card-tipo{color:var(--txt-faint)}

.card-medida{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;margin-top:1px}
.card.uso .card-medida{color:var(--blue)}
.card.proceso .card-medida{color:var(--amber)}
.card.listo .card-medida{color:var(--green)}
.card.sin-datos .card-medida{color:var(--txt-faint)}

.card-div{height:1px;margin:5px 0}
.card.uso .card-div{background:var(--blue-border)}
.card.proceso .card-div{background:var(--amber-border)}
.card.listo .card-div{background:var(--green-border)}
.card.sin-datos .card-div{background:var(--border)}

.ebadge{display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:700;padding:2px 8px;border-radius:2px;letter-spacing:.06em;align-self:flex-start;border:1px solid}
.card.uso .ebadge{background:var(--blue-bg);border-color:var(--blue-border);color:var(--blue-txt)}
.card.proceso .ebadge{background:var(--amber-bg);border-color:var(--amber-border);color:var(--amber-txt)}
.card.listo .ebadge{background:var(--green-bg);border-color:var(--green-border);color:var(--green-txt)}
.card.sin-datos .ebadge{background:var(--bg2);border-color:var(--border);color:var(--txt-faint)}

.card-info{font-size:10px;margin-top:2px;font-weight:500;font-style:italic}
.card.uso .card-info{color:var(--blue-border);color:#2a5090}
.card.proceso .card-info{color:#7a5000}
.card.listo .card-info{color:#006633}
.card.sin-datos .card-info{color:var(--txt-faint)}

.card-cambio{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--txt-dim);margin-top:2px}
.card.sin-datos .card-cambio{color:var(--txt-faint)}

/* ─── MESSAGES ─── */
.msg{text-align:center;padding:48px;font-size:13px;color:var(--txt-dim)}
.msg.error{color:var(--red)}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--border2);border-top-color:var(--amber);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ─── SEPARATOR ─── */
.sep{height:1px;background:var(--border);margin:16px 0}
</style>
</head>
<body>
<div class="app">

  <!-- TOPBAR -->
  <div class="topbar">
    <span class="logo">VERALLIA</span>
    <span class="topbar-title">DEFLECTORES <span>&</span> CANALETAS</span>
    <span class="badge-ts" id="badge-ts">–</span>
    <button class="reload-btn" onclick="cargarDatos()">↻ Actualizar</button>
    <div class="counters">
      <span class="cnt cnt-uso" id="cnt-uso">– EN USO</span>
      <span class="cnt cnt-proc" id="cnt-proc">– EN PROCESO</span>
      <span class="cnt cnt-listo" id="cnt-listo">– LISTO</span>
    </div>
  </div>

  <!-- DATE BAR -->
  <div class="date-bar">
    <button class="dnbtn" id="pp">◀◀</button>
    <button class="dnbtn" id="prev">◀</button>
    <span class="dlbl" id="dlbl"></span>
    <button class="dnbtn" id="next">▶</button>
    <button class="dnbtn" id="nn">▶▶</button>
    <button class="hoy-btn" id="hoy">HOY</button>
  </div>

  <!-- FILTERS -->
  <div class="filters">
    <label>Línea</label>
    <select id="flinea"><option value="">Todas</option></select>
    <label style="margin-left:8px">Tipo</label>
    <select id="ftipo">
      <option value="">Ambos</option>
      <option value="DEFLECTOR">Deflector</option>
      <option value="CANALETA">Canaleta</option>
    </select>
  </div>

  <!-- LEGEND -->
  <div class="legend">
    <div class="leg-i"><div class="ldot lu"></div>EN USO (dentro del período)</div>
    <div class="leg-i"><div class="ldot lp"></div>EN PROCESO (primeros 2 días post-vencimiento)</div>
    <div class="leg-i"><div class="ldot ll"></div>LISTO PARA USAR</div>
  </div>

  <!-- SUMMARY -->
  <div class="summary">
    <div class="stat">
      <div class="stat-lbl">En Uso</div>
      <div class="stat-num nu" id="cu">–</div>
      <div class="stat-sub">piezas instaladas</div>
    </div>
    <div class="stat">
      <div class="stat-lbl">En Proceso</div>
      <div class="stat-num np" id="cp">–</div>
      <div class="stat-sub">ventana 2 días</div>
    </div>
    <div class="stat">
      <div class="stat-lbl">Listo</div>
      <div class="stat-num nl" id="cl">–</div>
      <div class="stat-sub">disponible para instalar</div>
    </div>
  </div>

  <!-- LINES GRID -->
  <div class="lines" id="lines">
    <div class="msg"><span class="spinner"></span>Conectando con Google Sheets...</div>
  </div>

</div>

<script>
// ─── CONFIG ─────────────────────────────────────────────────
// ⚠️  Pegá acá la URL de tu Web App de Apps Script
const API_URL = 'https://script.google.com/macros/s/AKfycbzzczKD92veLEMrq0vLL91qzE1yEp2mLG_QGTlv9AW-8h_OBCEVO44WG297NgWrNmch/exec';
// ────────────────────────────────────────────────────────────

let DATOS = [];
let cur = new Date(); cur.setHours(0,0,0,0);

// ─── DATE UTILS ─────────────────────────────────────────────
function parseD(s) {
  if (!s) return null;
  try {
    const [y, m, d] = s.split('-').map(Number);
    if (!y || !m || !d || isNaN(y) || isNaN(m) || isNaN(d)) return null;
    return new Date(y, m - 1, d);
  } catch(e) { return null; }
}
function addDays(d, n) { const r = new Date(d); r.setDate(r.getDate() + n); return r; }
function diffDays(a, b) { return Math.floor((b - a) / 86400000); }
function fmtDisplay(d) {
  return d.toLocaleDateString('es-AR', {
    weekday:'long', day:'numeric', month:'long', year:'numeric'
  }).toUpperCase();
}
function fmtShort(s) {
  if (!s) return '–';
  try {
    const [y,m,d] = s.split('-');
    return d + '/' + m + '/' + y;
  } catch(e) { return s; }
}

// ─── ESTADO LOGIC ────────────────────────────────────────────
// USO:     dentro del período (cambio → vencimiento)
// PROCESO: días 1 y 2 después del vencimiento
// LISTO:   desde día 3 en adelante post-vencimiento
function getEstado(cambio, frec, ref) {
  if (!cambio || !frec) return 'sin-datos';
  const inicio = parseD(cambio);
  if (!inicio) return 'sin-datos';
  const venc = addDays(inicio, frec);
  const dv = diffDays(ref, venc);
  if (dv > 0) return 'uso';
  const diasPasados = -dv;
  if (diasPasados <= 2) return 'proceso';
  return 'listo';
}

// Estado de un equipo individual dentro de una línea
function getEstadoEquipo(equipo, equipoEnUso, equiposListos) {
  if (!equipo) return 'sin-datos';
  if (equipo === equipoEnUso) return 'uso';
  if (equiposListos && equiposListos.indexOf(equipo) !== -1) return 'listo';
  return 'proceso';
}

function estadoLabel(e) {
  return { uso:'EN USO', proceso:'EN PROCESO', listo:'LISTO', 'sin-datos':'SIN DATOS' }[e] || e;
}

function infoLabel(e, cambio, frec, ref) {
  if (!cambio || !frec || e === 'sin-datos') return '';
  const inicio = parseD(cambio);
  if (!inicio) return '';
  const venc = addDays(inicio, frec);
  const dv = diffDays(ref, venc);
  if (e === 'uso') {
    if (dv > 0) return dv === 1 ? 'Vence mañana' : `Vence en ${dv} día${dv !== 1 ? 's' : ''}`;
    return `Venció hace ${-dv} día${-dv !== 1 ? 's' : ''} — sigue en uso`;
  }
  if (e === 'proceso') {
    const diasFalt = Math.max(0, diffDays(ref, addDays(venc, 2)));
    return diasFalt === 0 ? 'Listo mañana' : `Listo en ${diasFalt + 1} día${diasFalt + 1 !== 1 ? 's' : ''}`;
  }
  if (e === 'listo') return 'Disponible para instalar';
  return '';
}

// ─── CARGAR DATOS ────────────────────────────────────────────
async function cargarDatos() {
  document.getElementById('badge-ts').textContent = 'Actualizando...';
  try {
    const res = await fetch(API_URL + '?t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const json = await res.json();
    if (json.error) throw new Error(json.error);
    DATOS = json.datos || [];

    // Poblar filtro de líneas
    const lineas = [...new Set(DATOS.map(d => d.linea))].sort();
    const sel = document.getElementById('flinea');
    const valAnt = sel.value;
    sel.innerHTML = '<option value="">Todas</option>';
    lineas.forEach(l => {
      const o = document.createElement('option');
      o.value = l; o.textContent = l;
      sel.appendChild(o);
    });
    if (valAnt) sel.value = valAnt;

    const ts = new Date(json.actualizado);
    document.getElementById('badge-ts').textContent =
      'Actualizado: ' + ts.toLocaleTimeString('es-AR', { hour:'2-digit', minute:'2-digit' });

    render();
  } catch(err) {
    document.getElementById('badge-ts').textContent = 'Error';
    document.getElementById('lines').innerHTML =
      `<div class="msg error">
        No se pudo conectar con Google Sheets.<br>
        <small style="opacity:.6">${err.message}</small><br><br>
        <button class="reload-btn" onclick="cargarDatos()">↻ Reintentar</button>
      </div>`;
  }
}

// ─── RENDER ──────────────────────────────────────────────────
function render() {
  const fL = document.getElementById('flinea').value;
  const fT = document.getElementById('ftipo').value;

  document.getElementById('dlbl').textContent = fmtDisplay(cur);

  const filtered = DATOS.filter(d =>
    (!fL || d.linea === fL) &&
    (!fT || d.tipo === fT)
  );

  // Totales
  let cu = 0, cp = 0, cl = 0;
  filtered.forEach(d => {
    const e = getEstado(d.cambio, d.frec, cur);
    if (e === 'uso') cu++;
    else if (e === 'proceso') cp++;
    else if (e === 'listo') cl++;
  });
  document.getElementById('cu').textContent = cu;
  document.getElementById('cp').textContent = cp;
  document.getElementById('cl').textContent = cl;
  document.getElementById('cnt-uso').textContent = cu + ' EN USO';
  document.getElementById('cnt-proc').textContent = cp + ' EN PROCESO';
  document.getElementById('cnt-listo').textContent = cl + ' LISTO';

  if (!filtered.length) {
    document.getElementById('lines').innerHTML = '<div class="msg">Sin datos para mostrar.</div>';
    return;
  }

  // Agrupar por línea
  const byLinea = {};
  filtered.forEach(d => {
    if (!byLinea[d.linea]) byLinea[d.linea] = { DEFLECTOR: [], CANALETA: [] };
    byLinea[d.linea][d.tipo].push(d);
  });

  const grid = document.getElementById('lines');

  // Guardar estado abierto de cada bloque
  const prevOpen = {};
  grid.querySelectorAll('.lblock').forEach(b => {
    prevOpen[b.dataset.linea] = b.querySelector('.lbody')?.classList.contains('open');
  });

  grid.innerHTML = '';

  Object.keys(byLinea).sort().forEach(linea => {
    const tipos = byLinea[linea];
    const all = [...tipos.DEFLECTOR, ...tipos.CANALETA];
    const ests = all.map(d => getEstado(d.cambio, d.frec, cur));
    const cU = ests.filter(e => e === 'uso').length;
    const cP = ests.filter(e => e === 'proceso').length;
    const cL = ests.filter(e => e === 'listo').length;

    const isOpen = prevOpen[linea] !== false; // abierto por defecto

    // Pills del header
    let pills = '';
    if (cP) pills += `<span class="pill p-proc">${cP} PROCESO</span>`;
    if (cL) pills += `<span class="pill p-listo">${cL} LISTO</span>`;
    if (cU) pills += `<span class="pill p-uso">${cU} EN USO</span>`;

    // Renderizar tarjetas por tipo
    function renderTipo(items, tipoNombre) {
      if (!items.length) return '';
      const cards = items.map(d => {
        // Si tiene equiposListos/equipoEnUso → modo equipos
        if (d.todosEquipos && d.todosEquipos.length) {
          return renderEquipos(d, tipoNombre);
        }
        // Modo clásico (fallback)
        const e = getEstado(d.cambio, d.frec, cur);
        const info = infoLabel(e, d.cambio, d.frec, cur);
        const medidaTxt = d.medida ? `<div class="card-medida">${d.medida}</div>` : '';
        let vencTxt = '<div class="card-cambio">Sin fecha registrada</div>';
        if (d.cambio && d.frec) {
          const inicio = parseD(d.cambio);
          if (inicio) {
            const venc = addDays(inicio, d.frec);
            const vy = venc.getFullYear();
            const vm = String(venc.getMonth()+1).padStart(2,'0');
            const vd = String(venc.getDate()).padStart(2,'0');
            vencTxt = `<div class="card-cambio">Próx. venc.: ${vd}/${vm}/${vy}</div>`;
          }
        }
        return `
          <div class="card ${e === 'sin-datos' ? 'sin-datos' : e}">
            <div class="card-tipo">${tipoNombre}</div>
            ${medidaTxt}
            <div class="card-div"></div>
            <span class="ebadge">${estadoLabel(e)}</span>
            ${info ? `<div class="card-info">${info}</div>` : ''}
            ${vencTxt}
          </div>`;
      }).join('');
      return `
        <div class="tipo-sec">
          <div class="tipo-lbl">${tipoNombre}S</div>
          <div class="cards">${cards}</div>
        </div>`;
    }

    function renderEquipos(d, tipoNombre) {
      // Renderizar una tarjeta por cada equipo posible
      const cards = d.todosEquipos.map(eq => {
        const e = getEstadoEquipo(eq, d.equipoEnUso, d.equiposListos);
        let info = '';
        let vencTxt = '';
        if (e === 'uso' && d.cambio && d.frec) {
          const inicio = parseD(d.cambio);
          if (inicio) {
            const venc = addDays(inicio, d.frec);
            const dv = diffDays(cur, venc);
            if (dv > 0) info = dv === 1 ? 'Vence mañana' : \`Vence en \${dv} días\`;
            else info = \`Venció hace \${-dv} día\${-dv !== 1 ? 's' : ''} — sigue en uso\`;
            const vy = venc.getFullYear();
            const vm = String(venc.getMonth()+1).padStart(2,'0');
            const vd = String(venc.getDate()).padStart(2,'0');
            vencTxt = \`<div class="card-cambio">Próx. venc.: \${vd}/\${vm}/\${vy}</div>\`;
          }
        }
        return \`
          <div class="card \${e === 'sin-datos' ? 'sin-datos' : e}">
            <div class="card-tipo">\${tipoNombre}</div>
            <div class="card-medida">\${eq}</div>
            <div class="card-div"></div>
            <span class="ebadge">\${estadoLabel(e)}</span>
            \${info ? \`<div class="card-info">\${info}</div>\` : ''}
            \${vencTxt}
          </div>\`;
      }).join('');
      return \`
        <div class="tipo-sec">
          <div class="tipo-lbl">\${tipoNombre}S</div>
          <div class="cards">\${cards}</div>
        </div>\`;
    }

    const block = document.createElement('div');
    block.className = 'lblock';
    block.dataset.linea = linea;
    block.innerHTML = `
      <div class="lhdr">
        <span class="lname">${linea}</span>
        <div class="pills">${pills}</div>
        <span class="chev ${isOpen ? 'open' : ''}">▶</span>
      </div>
      <div class="lbody ${isOpen ? 'open' : ''}">
        ${renderTipo(tipos.DEFLECTOR, 'DEFLECTOR')}
        ${tipos.DEFLECTOR.length && tipos.CANALETA.length ? '<div class="sep"></div>' : ''}
        ${renderTipo(tipos.CANALETA, 'CANALETA')}
        ${!tipos.DEFLECTOR.length && !tipos.CANALETA.length
          ? '<div class="msg" style="padding:8px 0;text-align:left;font-size:11px">Sin datos.</div>'
          : ''}
      </div>`;

    block.querySelector('.lhdr').addEventListener('click', () => {
      const body = block.querySelector('.lbody');
      const chev = block.querySelector('.chev');
      body.classList.toggle('open');
      chev.classList.toggle('open', body.classList.contains('open'));
    });

    grid.appendChild(block);
  });
}

// ─── EVENTOS ─────────────────────────────────────────────────
document.getElementById('pp').addEventListener('click', () => { cur = addDays(cur, -7); render(); });
document.getElementById('prev').addEventListener('click', () => { cur = addDays(cur, -1); render(); });
document.getElementById('next').addEventListener('click', () => { cur = addDays(cur, 1); render(); });
document.getElementById('nn').addEventListener('click', () => { cur = addDays(cur, 7); render(); });
document.getElementById('hoy').addEventListener('click', () => { cur = new Date(); cur.setHours(0,0,0,0); render(); });
document.getElementById('flinea').addEventListener('change', render);
document.getElementById('ftipo').addEventListener('change', render);

// ─── INIT ────────────────────────────────────────────────────
cur = new Date(); cur.setHours(0, 0, 0, 0);
cargarDatos();
setInterval(cargarDatos, 5 * 60 * 1000); // auto-refresh cada 5 min
</script>
</body>
